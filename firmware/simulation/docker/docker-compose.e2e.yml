# SAINT.OS end-to-end test orchestration.
#
# Usage:
#   # First time / after firmware changes, build the sim firmware on
#   # the host so the container can mount the install dir:
#   (cd firmware/rp2040 && ./build.sh sim && cd build_sim && make install_sim)
#
#   # Then run the e2e:
#   docker compose -f firmware/simulation/docker/docker-compose.e2e.yml up \
#       --build --abort-on-container-exit --exit-code-from e2e
#
#   # Smoke test only (sim node bring-up, no server):
#   MODE=smoke docker compose -f ... up --build --abort-on-container-exit --exit-code-from e2e
#
#   # Drop into a debug shell with agent + server running:
#   MODE=shell docker compose -f ... run --rm --service-ports e2e
#
# Single-service today by design — see the header of Dockerfile.e2e for
# why agent + server + Renode share one network namespace. To split:
# add discovery-server config + change network_mode for each service.

services:
  e2e:
    # No platform pin: Renode 1.16+ ships native arm64 + amd64 builds,
    # and the Dockerfile picks the right one via TARGETARCH. On Apple
    # Silicon you now get an arm64 container with native arm64 Renode
    # (no Rosetta). On x86_64 hosts you get an amd64 container.
    build:
      context: ../../..
      dockerfile: firmware/simulation/docker/Dockerfile.e2e
      args:
        # Must match the micro-ROS client baked into the firmware.
        # The Pico SDK lib (lib/micro_ros_raspberrypi_pico_sdk) has a
        # branch per distro — keep it on `jazzy` to match. Mismatched
        # versions crash the agent on the first XRCE packet — see
        # Dockerfile.e2e comment on ROS_DISTRO for the gory details.
        ROS_DISTRO: jazzy
        # 1.16+ is needed for arm64 support; older Mono-based builds
        # crashed under Rosetta on Apple Silicon. The bootrom/XIP
        # concern that motivated the old 1.15.3 pin is re-evaluated
        # with 1.16+ — if the simulator path regresses, log a fix in
        # firmware/rp2040/simulation/ rather than downgrading here.
        RENODE_VERSION: 1.16.1

    environment:
      ROS_DISTRO: jazzy
      # Default to the Python fake-firmware path. MODE=full uses
      # Renode-sim firmware (currently blocked on the bootrom/XIP
      # modelling issue described in the entrypoint header).
      MODE: ${MODE:-fake}
      WS_URL: ${WS_URL:-ws://localhost:80/api/ws}
      PASSWORD: ${PASSWORD:-12345}
      # Use Cyclone DDS in the test container. Fast DDS's multicast
      # discovery is unreliable inside a single docker container —
      # pubs/subs work but ros2 node list / topic info can't see them.
      # Production may still use Fast DDS; that's the operator's call.
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}

    volumes:
      # Pre-built sim firmware lives here. The harness's resc loads
      # it from /work/firmware/rp2040/install/simulation/.
      - ../../rp2040/install/simulation:/work/firmware/rp2040/install/simulation:ro

      # Persistent storage backing for sim nodes — analogous to
      # firmware/simulation/rp2040_storage/ on the host. Kept in a
      # docker volume so multiple runs can simulate "node had a
      # previous boot's config".
      - sim_storage:/work/firmware/simulation/rp2040_storage

      # Test logs — make them available to the host for post-mortem.
      - ../../simulation/logs:/work/firmware/simulation/logs

    # Useful for debugging: expose the HTTP/WS and agent ports to the
    # host so `wscat -c ws://localhost:8080/api/ws` from the host works
    # while the container is running. The server listens on port 80
    # inside the container (privileged port) — map to 8080 outside so
    # we don't need root.
    ports:
      - "8080:80"     # SAINT.OS HTTP + WebSocket (/api/ws)
      - "8888:8888/udp"  # micro-ROS agent

    # Renode needs more memory than the default — RP2040 + dual-core +
    # bootrom + flash model adds up. 2 GB is comfortable headroom.
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  sim_storage:
