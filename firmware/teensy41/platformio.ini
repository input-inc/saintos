; SAINT.OS Node Firmware for Teensy 4.1
;
; Build with PlatformIO + Arduino framework + micro-ROS
;
; Usage:
;   pio run -e hardware    # Build for real hardware
;   pio run -e simulation  # Build for Renode simulation

[platformio]
; Surface the build artifacts (firmware.hex / .elf / .bin) at
; firmware/teensy41/build/<env>/ instead of the default hidden
; .pio/build/<env>/. Matches the RP2040 layout so Teensy Loader and
; debug tooling find the files in the same place across both
; platforms. The library cache stays at .pio/libdeps/ — that's
; package-manager state, not a build artifact.
build_dir = build

[env]
; Pin the platform (and thus its bundled ARM GCC toolchain). Left
; unpinned, PlatformIO resolves `teensy` to the newest release; a recent
; one ships GCC 14/15, which promotes micro-ROS rcutils' implicit
; `clock_gettime` (time_unix.c) from a warning to a hard error and fails
; the build. 5.0.0 bundles GCC 11.3.1, which builds micro-ROS clean.
; Pinning also makes a cold CI cache reproduce a working build instead of
; silently drifting with the toolchain. Bump deliberately, verified in CI.
platform = teensy@5.0.0
board = teensy41
board_microros_distro = kilted
framework = arduino
build_flags =
    -I../shared/include
    -DFIRMWARE_VERSION_MAJOR=1
    -DFIRMWARE_VERSION_MINOR=0
    -DFIRMWARE_VERSION_PATCH=0
    -std=gnu++17
    -Wno-unused-variable
build_src_filter = +<*> +<../transport/*> +<../../shared/src/*>
; Pinned to a commit, NOT a tag, on purpose: this wrapper tracks `main`,
; and its only release tags (1.0.0 / 2.0.0) predate ROS Kilted — a tag
; would drop the `board_microros_distro = kilted` support we rely on.
; A commit is the only stable pin. Bump deliberately, verified in CI.
; NOTE: this freezes the PlatformIO wrapper, not the ROS package sources
; it fetches per distro — full reproducibility would pin those separately.
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio#cfee17faffaa532363b7151dd13af6a85c69d3c1
upload_protocol = teensy-cli
; Patches the installed micro_ros_platformio to skip rmw_test_fixture in
; its dev colcon build — a kilted-only upstream bug. See patch_microros.py
; for the full story. Remove this once upstream PR #189 lands and we pin
; lib_deps to a release tag that contains it.
extra_scripts =
    pre:patch_microros.py

[env:hardware]
;board_microros_transport = ethernet
build_flags =
    ${env.build_flags}
    -DHARDWARE_BUILD=1
; These are PlatformIO registry libraries resolved by name. They publish
; no usable release tags (USBHost_t36 has none; NativeEthernet only cryptic
; `stable*` snapshots) and are low-drift — near-frozen upstream — so a
; bare registry name is the readable, stable reference. NeoPixel is
; major-locked (^1.x). If any ever regresses, pin it to an exact registry
; version here (Name@X.Y.Z), which stays readable — no commit hashes.
lib_deps =
    ${env.lib_deps}
    NativeEthernet
    USBHost_t36
    ; External WS2812 NeoPixel strips on arbitrary GPIOs (operator-added
    ; "neopixel" peripherals). Bit-bang driver, works on any Teensy 4.1
    ; pin. Hardware-only — the simulation env stubs neopixel_strip.cpp.
    adafruit/Adafruit NeoPixel@^1.12.0
extra_scripts =
    ${env.extra_scripts}
    post:generate_version.py
    post:stage_firmware.py

[env:simulation]
build_flags =
    ${env.build_flags}
    -DSIMULATION=1
build_src_filter = +<*> +<../../shared/src/*>
; patch_sim_elf rewrites configure_cache's entry to `bx lr` — Renode's
; Cortex-M model faults in the cache/MPU enable sequence and the sim has
; no real cache to configure anyway. See the script header for why this
; isn't done with `-Wl,--wrap=` (same-TU call, --wrap can't see it).
extra_scripts =
    ${env.extra_scripts}
    post:generate_version.py
    post:patch_sim_elf.py
