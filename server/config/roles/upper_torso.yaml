# SAINT.OS Role Definition - Upper Torso
#
# Node mounted in the upper torso (Feather RP2040 + Ethernet FeatherWing).
# Drives the torso lift actuator and the neck mechanism.
#
# Summary:
#   1 Actuator (torso lift, driven as servo/PWM)
#   4 Servos (neck drive, 2 neck cylinders, neck rotation)

role: upper_torso
display_name: "Upper Torso"
description: "Controls the upper torso lift actuator and the neck drive, cylinder, and rotation servos"

# Independent per-function control — no differential-drive mixing.
control_type: single_axis

logical_functions:
  - name: torso_actuator
    display_name: "Upper Torso Actuator"
    type: servo_output
    required: true
    description: "Linear actuator that raises/lowers the upper torso"
    compatible_modes:
      - servo
      - pwm
    default_params:
      pwm_frequency: 50
      min_pulse_us: 1000
      max_pulse_us: 2000
      center_pulse_us: 1500

  - name: neck_drive
    display_name: "Neck Drive"
    type: servo_output
    required: true
    description: "Servo driving the neck fore/aft mechanism"
    compatible_modes:
      - servo
      - pwm
    default_params:
      pwm_frequency: 50
      min_pulse_us: 1000
      max_pulse_us: 2000
      center_pulse_us: 1500

  - name: neck_cylinder_left
    display_name: "Neck Cylinder Left"
    type: servo_output
    required: true
    description: "Left neck cylinder servo"
    compatible_modes:
      - servo
      - pwm
    default_params:
      pwm_frequency: 50
      min_pulse_us: 1000
      max_pulse_us: 2000
      center_pulse_us: 1500

  - name: neck_cylinder_right
    display_name: "Neck Cylinder Right"
    type: servo_output
    required: true
    description: "Right neck cylinder servo"
    compatible_modes:
      - servo
      - pwm
    default_params:
      pwm_frequency: 50
      min_pulse_us: 1000
      max_pulse_us: 2000
      center_pulse_us: 1500

  - name: neck_rotation
    display_name: "Neck Rotation"
    type: servo_output
    required: true
    description: "PWM servo for neck rotation (pan)"
    compatible_modes:
      - servo
      - pwm
    default_params:
      pwm_frequency: 50
      min_pulse_us: 1000
      max_pulse_us: 2000
      center_pulse_us: 1500
