# Flatpak manifest for the SAINT.OS Controller.
#
# Builds the Angular frontend + Tauri Rust binary INSIDE the Flatpak
# sandbox, against the GNOME runtime's bundled webkit2gtk-4.1. That
# avoids the distrobox-vs-host glibc/webkit mismatch that bit us when
# trying to run the bare `tauri build` binary on SteamOS.
#
# Build (from controller/):
#   flatpak-builder --user --install --force-clean \
#       build-dir flatpak/com.saintos.Controller.yml
#
# Run:
#   flatpak run com.saintos.Controller
#
# Or, for a one-file artifact you can distribute:
#   flatpak-builder --repo=repo --force-clean build-dir flatpak/com.saintos.Controller.yml
#   flatpak build-bundle repo SAINT-Controller.flatpak com.saintos.Controller
#
# Prereqs on the Steam Deck (one-time, requires internet once):
#   flatpak install --user flathub org.flatpak.Builder
#   flatpak install --user flathub org.gnome.Sdk//50 org.gnome.Platform//50
#   flatpak install --user flathub org.freedesktop.Sdk.Extension.rust-stable//25.08
#   flatpak install --user flathub org.freedesktop.Sdk.Extension.node20//25.08
#
# Runtime version note: bump together with the SDK extensions. GNOME's
# effective policy is "EOL when the next-next release ships," so each
# runtime gets ~12 months of support. To find the current version:
#   flatpak remote-info flathub org.gnome.Platform
# The `Branch:` line is what to pin. Bump runtime-version below AND
# the matching install command in flatpak/build.sh in lockstep.
# webkit2gtk-4.1 is still in the GNOME runtime as of //50.

app-id: com.saintos.Controller
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk

# SDK extensions provide the Rust and Node toolchains inside the
# sandbox. The Rust + Node versions are SDK-side only — they don't
# bleed into the runtime, so the final Flatpak is smaller than it'd be
# if we baked them in.
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20

command: saint-controller

# Sandbox permissions. Tight — we only let the app reach what it
# actually needs to function:
#   - ipc/x11/wayland: graphics
#   - pulseaudio: future audio cues (not strictly needed today)
#   - device=all: gamepads / HID joysticks / Steam Deck inputs
#   - network: the WebSocket connection to the robot
#   - filesystem=xdg-config: where we persist connection settings
#   - filesystem=xdg-data: where Tauri's logger writes log files
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  - --device=dri
  - --filesystem=xdg-config/saint-controller:create
  - --filesystem=xdg-data/saint-controller:create
  # Steam userdata: read shortcuts.vdf, write into config/grid/.
  # Only needed by the bundled saint-controller-artwork-setup
  # helper. The main controller binary never touches this path,
  # but Flatpak finish-args are app-wide so the grant applies to
  # every entry point. Worth it for the one-command artwork setup.
  - --filesystem=xdg-data/Steam

# Build-time environment: put the SDK extension binaries on PATH,
# point CARGO_HOME at a writeable in-build location (the default
# ~/.cargo is read-only in the sandbox), and allow network during
# the build so cargo can fetch crates and npm can fetch packages.
# Vendoring those would let us drop --share=network here at the cost
# of ~1 GB committed; not worth it for an internal-build artifact.
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/saint-controller/cargo
    npm_config_cache: /run/build/saint-controller/npm-cache
    # Suppress interactive prompts from tools that don't realize
    # they're running in a sandbox without a tty. Angular CLI in
    # particular asks for analytics consent on first run and
    # crashes with `force closed the prompt with 0 null` when it
    # can't read stdin. NG_CLI_ANALYTICS=false skips the prompt
    # entirely; CI=true is the conventional flag a lot of other
    # tools (npm, ng, cargo subcommands) check to suppress
    # interactivity. Belt and suspenders.
    NG_CLI_ANALYTICS: 'false'
    CI: 'true'

modules:
  - name: saint-controller
    buildsystem: simple
    build-commands:
      # Build via the Tauri CLI rather than bare cargo. Reason: the
      # CLI's release flow runs `beforeBuildCommand` (npm run build),
      # then invokes `tauri-codegen` with the right env vars to embed
      # the production frontend bundle and switch the webview from
      # devUrl to the `tauri://` custom protocol. Bare `cargo build`
      # skips that, producing a release-profile binary that still
      # tries to fetch the frontend from http://localhost:4200 — the
      # symptom is "connection refused" in the webview when launching
      # the released app.
      #
      # `--no-bundle` skips Tauri's .deb/.rpm/.AppImage step (we don't
      # want those layered under the Flatpak — and AppImage in
      # particular needs linuxdeploy + FUSE which doesn't play well
      # inside flatpak-builder's nested sandbox).
      - cd controller && npm ci --no-audit --no-fund
      - cd controller && npx tauri build --no-bundle

      # Install paths follow the Flatpak conventions so KDE Discover
      # / Game Mode find the app properly.
      - install -Dm755 controller/src-tauri/target/release/saint-controller
                       /app/bin/saint-controller
      - install -Dm644 controller/flatpak/com.saintos.Controller.desktop
                       /app/share/applications/com.saintos.Controller.desktop
      - install -Dm644 controller/flatpak/com.saintos.Controller.metainfo.xml
                       /app/share/metainfo/com.saintos.Controller.metainfo.xml
      - install -Dm644 controller/src-tauri/icons/icon.png
                       /app/share/icons/hicolor/256x256/apps/com.saintos.Controller.png

      # Steam library art (capsule + hero). Steam doesn't read these
      # itself — non-Steam game artwork lives in
      # ~/.local/share/Steam/userdata/<user>/config/grid/ named after
      # the operator-assigned app ID. We bundle them here so the
      # operator has a stable, predictable path to point Steam's
      # "Set Custom Artwork" dialog at, regardless of what dev
      # machine the controller was synced from. After install the
      # files are at:
      #   ~/.local/share/flatpak/app/com.saintos.Controller/current/
      #     active/files/share/com.saintos.Controller/art/
      # (user install) or under /var/lib/flatpak for system installs.
      - install -Dm644 controller/images/libraryCapsule.png
                       /app/share/com.saintos.Controller/art/library-capsule.png
      - install -Dm644 controller/images/libraryHero.png
                       /app/share/com.saintos.Controller/art/library-hero.png

      # Helper script that reads ~/.local/share/Steam/userdata/.../
      # shortcuts.vdf to find the operator-assigned non-Steam-game
      # appid, then copies the bundled art into the grid dir with the
      # filenames Steam looks for. Exposed at /app/bin/ so the
      # operator can invoke it after the controller's installed:
      #   flatpak run --command=saint-controller-artwork-setup \
      #     com.saintos.Controller
      # build.sh also runs it from the HOST shell as a post-install
      # step (which doesn't need Flatpak filesystem perms — the host
      # shell already has full home access).
      - install -Dm755 controller/scripts/set-steamdeck-artwork.py
                       /app/bin/saint-controller-artwork-setup

    sources:
      # The whole repo, relative to the manifest. flatpak-builder
      # copies this into the build sandbox. We skip the heavy build
      # outputs so the copy is fast — those'll be regenerated inside
      # the sandbox anyway.
      #
      # CRITICAL: skip ALL flatpak-builder state directories under
      # controller/. Without these the source copy recursively pulls
      # in the previous build's nested copy of itself, doubling disk
      # usage every invocation and eventually exhausting /home. The
      # symptom is "no space left on device" with a path like
      # .../saint-controller-1/controller/.flatpak-builder/.../
      # saint-controller-2/controller/.flatpak-builder/...
      - type: dir
        path: ../..
        skip:
          - controller/node_modules
          - controller/dist
          - controller/.angular
          - controller/src-tauri/target
          - controller/src-tauri/gen
          - controller/.flatpak-cache
          - controller/.flatpak-builder      # legacy state dir from earlier script revs
          - controller/flatpak-build         # legacy positional build dir
          - controller/flatpak-repo          # legacy --bundle output repo
          - controller/SAINT-Controller.flatpak
          - dist
          - build
          - install
          - log
          - _ros2
          - _ros2_src
          - _debs
          - pico-sdk
          - saint_os/firmware/rp2040/build
          - saint_os/firmware/rp2040/build_sim
          - saint_os/firmware/teensy41/.pio
          - .git
