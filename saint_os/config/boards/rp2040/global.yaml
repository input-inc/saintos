# Chip family definition for the Raspberry Pi RP2040.
#
# Describes what's possible at the silicon level — every legal GPIO,
# every legal UART pair, etc. Board files in the same directory layer
# on top of this with board-specific subsets (which pins are exposed
# to header pads, which are reserved by onboard hardware, what built-
# in peripherals exist).
#
# The server loads this once at startup and reuses it across every
# board in this directory.

chip_family: rp2040
display_name: "Raspberry Pi RP2040"
description: "Dual Cortex-M0+ with 30 GPIO pins, two UARTs, two I²C, two SPI."

# Sanity-check value the firmware can emit alongside its chip_family
# string — read from the SYSINFO_CHIP_ID register at 0x40000000.
# Layout (lower 28 bits, mask off the silicon-revision nibble):
#   bits 27:12  PART         = 0x0002  (RP2040)
#   bits 11:0   MANUFACTURER = 0x927   (Raspberry Pi)
# So (chip_id_reg & 0x0FFFFFFF) == 0x00002927 on every RP2040 chip.
chip_id_value: 0x00002927

gpio_count: 30

# Per-GPIO capabilities at the chip level. A board's available_pins
# entries reference these by GPIO number — the capability list is the
# union of everything possible at the silicon level. A board's
# reserved_pins entries don't appear here at all (reserved = "board
# claimed it for system use" rather than "chip can't do this").
pin_capabilities:
  - {gpio:  0, default_name: "GP0",  caps: ["digital_in", "digital_out", "pwm", "uart_tx", "i2c_sda", "spi_rx"]}
  - {gpio:  1, default_name: "GP1",  caps: ["digital_in", "digital_out", "pwm", "uart_rx", "i2c_scl", "spi_cs"]}
  - {gpio:  2, default_name: "GP2",  caps: ["digital_in", "digital_out", "pwm", "i2c_sda", "spi_sck"]}
  - {gpio:  3, default_name: "GP3",  caps: ["digital_in", "digital_out", "pwm", "i2c_scl", "spi_tx"]}
  - {gpio:  4, default_name: "GP4",  caps: ["digital_in", "digital_out", "pwm", "uart_tx", "i2c_sda", "spi_rx"]}
  - {gpio:  5, default_name: "GP5",  caps: ["digital_in", "digital_out", "pwm", "uart_rx", "i2c_scl", "spi_cs"]}
  - {gpio:  6, default_name: "GP6",  caps: ["digital_in", "digital_out", "pwm", "i2c_sda", "spi_sck"]}
  - {gpio:  7, default_name: "GP7",  caps: ["digital_in", "digital_out", "pwm", "i2c_scl", "spi_tx"]}
  - {gpio:  8, default_name: "GP8",  caps: ["digital_in", "digital_out", "pwm", "uart_tx", "i2c_sda", "spi_rx"]}
  - {gpio:  9, default_name: "GP9",  caps: ["digital_in", "digital_out", "pwm", "uart_rx", "i2c_scl", "spi_cs"]}
  - {gpio: 10, default_name: "GP10", caps: ["digital_in", "digital_out", "pwm", "i2c_sda", "spi_sck"]}
  - {gpio: 11, default_name: "GP11", caps: ["digital_in", "digital_out", "pwm", "i2c_scl", "spi_tx"]}
  - {gpio: 12, default_name: "GP12", caps: ["digital_in", "digital_out", "pwm", "uart_tx", "i2c_sda", "spi_rx"]}
  - {gpio: 13, default_name: "GP13", caps: ["digital_in", "digital_out", "pwm", "uart_rx", "i2c_scl", "spi_cs"]}
  - {gpio: 14, default_name: "GP14", caps: ["digital_in", "digital_out", "pwm", "i2c_sda", "spi_sck"]}
  - {gpio: 15, default_name: "GP15", caps: ["digital_in", "digital_out", "pwm", "i2c_scl", "spi_tx"]}
  - {gpio: 16, default_name: "GP16", caps: ["digital_in", "digital_out", "pwm", "uart_tx", "i2c_sda", "spi_rx"]}
  - {gpio: 17, default_name: "GP17", caps: ["digital_in", "digital_out", "pwm", "uart_rx", "i2c_scl", "spi_cs"]}
  - {gpio: 18, default_name: "GP18", caps: ["digital_in", "digital_out", "pwm", "i2c_sda", "spi_sck"]}
  - {gpio: 19, default_name: "GP19", caps: ["digital_in", "digital_out", "pwm", "i2c_scl", "spi_tx"]}
  - {gpio: 20, default_name: "GP20", caps: ["digital_in", "digital_out", "pwm", "uart_tx", "i2c_sda", "spi_rx"]}
  - {gpio: 21, default_name: "GP21", caps: ["digital_in", "digital_out", "pwm", "uart_rx", "i2c_scl", "spi_cs"]}
  - {gpio: 22, default_name: "GP22", caps: ["digital_in", "digital_out", "pwm", "i2c_sda", "spi_sck"]}
  - {gpio: 23, default_name: "GP23", caps: ["digital_in", "digital_out", "pwm", "i2c_scl", "spi_tx"]}
  - {gpio: 24, default_name: "GP24", caps: ["digital_in", "digital_out", "pwm", "uart_tx", "i2c_sda", "spi_rx"]}
  - {gpio: 25, default_name: "GP25", caps: ["digital_in", "digital_out", "pwm", "uart_rx", "i2c_scl", "spi_cs"]}
  - {gpio: 26, default_name: "GP26", caps: ["digital_in", "digital_out", "pwm", "i2c_sda", "spi_sck", "adc"]}
  - {gpio: 27, default_name: "GP27", caps: ["digital_in", "digital_out", "pwm", "i2c_scl", "spi_tx",  "adc"]}
  - {gpio: 28, default_name: "GP28", caps: ["digital_in", "digital_out", "pwm", "uart_tx", "i2c_sda", "spi_rx", "adc"]}
  - {gpio: 29, default_name: "GP29", caps: ["digital_in", "digital_out", "pwm", "uart_rx", "i2c_scl", "spi_cs", "adc"]}

# All UART (tx, rx) combinations legal at the chip level. The RP2040
# has two UART instances (UART0 and UART1), each routable to several
# pin pairs via the IO_BANK pad mux.
uart_pairs:
  - {uart: 0, tx: 0,  rx: 1}
  - {uart: 0, tx: 12, rx: 13}
  - {uart: 0, tx: 16, rx: 17}
  - {uart: 0, tx: 28, rx: 29}
  - {uart: 1, tx: 4,  rx: 5}
  - {uart: 1, tx: 8,  rx: 9}
  - {uart: 1, tx: 20, rx: 21}
  - {uart: 1, tx: 24, rx: 25}

# ADC-capable pins (chip-level — board may not break them out).
adc_pins: [26, 27, 28, 29]
