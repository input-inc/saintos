name: ros2-build

# Source-builds ROS2 (ros_base subset) plus the micro-ROS agent inside a
# Debian Bookworm container on an arm64 runner. The resulting install/ tree
# is published as a GitHub Release tagged with a content hash, so the dist
# workflow can pull a pre-built copy in seconds instead of re-building it
# (45-90 minutes cold).
#
# Re-runs are idempotent: if a release with the computed tag already exists,
# the build is skipped entirely.

on:
  workflow_dispatch:
    inputs:
      ros_distro:
        description: 'ROS2 distro to build'
        default: jazzy
        required: false
      force_rebuild:
        description: 'Rebuild even if a release with the computed tag exists'
        type: boolean
        default: false
        required: false
  push:
    branches: [main]
    paths:
      - '.github/workflows/ros2-build.yml'
      - 'scripts/build-ros2-in-container.sh'

concurrency:
  group: ros2-build-${{ github.event.inputs.ros_distro || 'jazzy' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 180
    env:
      ROS_DISTRO: ${{ github.event.inputs.ros_distro || 'jazzy' }}

      # Upstream pins. Both used to track moving branches (`jazzy`),
      # which meant the content hash drifted whenever upstream
      # committed — silently invalidating the cached release while
      # dist still tried to use it ("No ROS2 release …-<hash> found")
      # and occasionally pulling in an upstream regression we hadn't
      # screened. Pinning to release tags makes the hash a function
      # of *this repo's* state only. Bump deliberately when a fix
      # or feature you want lands upstream.
      #
      #   ROS2_REPOS_REF: ros2/ros2 release tag — date-stamped jazzy
      #     releases live at refs/tags/release-jazzy-YYYYMMDD. See
      #     https://github.com/ros2/ros2/tags?q=release-jazzy for the
      #     full list.
      #   MICRO_ROS_REF: micro-ROS/micro_ros_setup tag (or branch / SHA;
      #     the git operations below accept all three). 5.0.2 is the
      #     current jazzy-line head as a tagged release.
      ROS2_REPOS_REF: release-jazzy-20260128
      MICRO_ROS_REF: 5.0.2

      ARCH: arm64
      DEBIAN_RELEASE: bookworm

    steps:
      - uses: actions/checkout@v5

      # ----------------------------------------------------------------------
      # Compute a content hash over the inputs that determine binary output.
      # With ROS2_REPOS_REF + MICRO_ROS_REF both pinned in this file, the
      # hash only changes when we bump those (or when build-ros2-in-container.sh
      # changes). No more silent drift from upstream branch motion.
      - name: Resolve upstream refs and compute hash
        id: hash
        run: |
          set -eo pipefail
          mkdir -p _ros2_src
          cd _ros2_src

          # ros2.repos at the pinned release tag — the canonical
          # pinned-SHA file maintained by the ROS2 team, frozen to a
          # release-day snapshot rather than the moving jazzy branch.
          curl -fsSL \
            "https://raw.githubusercontent.com/ros2/ros2/${ROS2_REPOS_REF}/ros2.repos" \
            -o ros2.repos

          # micro_ros_setup at the pinned ref. We resolve to a concrete
          # SHA up-front so the hash input is stable across runs even
          # if a tag ever gets force-moved (rare but possible).
          MICRO_SHA=$(git ls-remote https://github.com/micro-ROS/micro_ros_setup.git \
            "refs/tags/${MICRO_ROS_REF}" "refs/heads/${MICRO_ROS_REF}" "${MICRO_ROS_REF}" \
            | head -n1 | awk '{print $1}')
          if [[ -z "${MICRO_SHA}" ]]; then
            echo "::error::Could not resolve MICRO_ROS_REF='${MICRO_ROS_REF}' to a SHA"
            exit 1
          fi
          echo "micro_ros_setup_sha=${MICRO_SHA}" > micro_ros.txt
          echo "$MICRO_SHA" > micro_ros_setup.sha

          # Hash the build script content too so changes to it (e.g. a
          # different Micro-XRCE-DDS-Agent pin) produce a fresh tag —
          # otherwise the cache-lookup below sees the old release and
          # skips rebuilding even though the inputs that govern the
          # binary output have changed.
          BUILD_SCRIPT="${GITHUB_WORKSPACE}/scripts/build-ros2-in-container.sh"
          HASH=$(cat ros2.repos micro_ros.txt "${BUILD_SCRIPT}" | sha256sum | cut -c1-12)
          TAG="ros2-${ROS_DISTRO}-${ARCH}-${HASH}"

          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"   >> "$GITHUB_OUTPUT"
          echo "micro_sha=${MICRO_SHA}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"
          echo "  ros2/ros2 ref: ${ROS2_REPOS_REF}"
          echo "  ros2.repos lines: $(wc -l < ros2.repos)"
          echo "  micro_ros_setup ref: ${MICRO_ROS_REF} (${MICRO_SHA})"

      # ----------------------------------------------------------------------
      - name: Check whether release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ github.event.inputs.force_rebuild }}
        run: |
          if [[ "$FORCE" == "true" ]]; then
            echo "Force rebuild requested — proceeding."
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh release view "${{ steps.hash.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.hash.outputs.tag }} already exists — nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing release for ${{ steps.hash.outputs.tag }} — will build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ----------------------------------------------------------------------
      # Fast-path: try to restore a previous build from GHA cache (7-day TTL
      # since last hit). Only useful if we're re-running for the same hash
      # within the eviction window.
      - name: Restore from GHA cache (fast path)
        if: steps.release_check.outputs.exists != 'true'
        id: ros2_cache
        uses: actions/cache@v5
        with:
          path: ros2-install.tar.gz
          key: ${{ steps.hash.outputs.tag }}

      # ----------------------------------------------------------------------
      - name: Source-build ROS2 + micro-ROS agent
        if: steps.release_check.outputs.exists != 'true' && steps.ros2_cache.outputs.cache-hit != 'true'
        env:
          ROS_DISTRO: ${{ env.ROS_DISTRO }}
          MICRO_ROS_REF: ${{ env.MICRO_ROS_REF }}
          DEBIAN_RELEASE: ${{ env.DEBIAN_RELEASE }}
        run: |
          set -eo pipefail
          chmod +x scripts/build-ros2-in-container.sh
          scripts/build-ros2-in-container.sh

      # ----------------------------------------------------------------------
      - name: Publish GitHub Release
        if: steps.release_check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.hash.outputs.tag }}" \
            --title "ROS2 ${{ env.ROS_DISTRO }} (${{ env.ARCH }}, ${{ env.DEBIAN_RELEASE }})" \
            --notes "Source-built ROS2 ${{ env.ROS_DISTRO }} ros_base + micro_ros_agent. \
            Built against Debian ${{ env.DEBIAN_RELEASE }} (glibc 2.36, libpython3.11). \
            Compatible with Raspberry Pi OS Bookworm natively, and Ubuntu 24.04 with libpython3.11 installed. \
            \
            micro_ros_setup branch: ${{ env.MICRO_ROS_REF }} @ ${{ steps.hash.outputs.micro_sha }}" \
            ros2-install.tar.gz
