name: dist

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (default: <VERSION>-<sha7>)'
        required: false

concurrency:
  group: dist-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: v
        run: |
          set -euo pipefail
          BASE=$(tr -d '[:space:]' < server/VERSION)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${BASE}-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

  # ---------------------------------------------------------------------------
  firmware-rp2040:
    needs: meta
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          # Only the small host tools. The heavy ARM toolchain (gcc-arm-none-eabi
          # + newlib + libstdc++, ~450 MB every run and prone to stalling on the
          # Azure apt mirror) is now provided by the cached, pinned
          # arm-none-eabi-gcc action below. ccache speeds the recompile.
          sudo apt-get install -y cmake build-essential python3 git ccache

      - name: Install ARM toolchain (pinned + cached)
        # Same GCC as the old apt package (10.3-2021.07), but fetched once and
        # cached by the action — no 450 MB apt download, no mirror stalls, and
        # the version is pinned instead of whatever apt happens to serve.
        uses: carlosperate/arm-none-eabi-gcc-action@v1.13.0
        with:
          release: '10.3-2021.07'

      - name: Cache Pico SDK
        id: pico-sdk-cache
        uses: actions/cache@v5
        with:
          path: ~/pico-sdk
          # 2.2.0 to match CMakeLists.txt's PICO_SDK_FETCH_VERSION (the CI
          # clone used to be 2.1.0 — an inconsistency, since PICO_SDK_PATH
          # made the build silently use the CI copy).
          key: pico-sdk-2.2.0

      - name: Clone Pico SDK
        if: steps.pico-sdk-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 2.2.0 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          git -C ~/pico-sdk submodule update --init --recursive --depth 1

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          # Roll the object cache forward each commit, restoring the newest
          # prior cache as the base (exact-key misses fall back to the prefix).
          key: ccache-rp2040-${{ github.sha }}
          restore-keys: ccache-rp2040-

      - name: Build firmware (hardware)
        env:
          PICO_SDK_PATH: /home/runner/pico-sdk
        run: |
          cd firmware/rp2040
          ./build.sh hw

      - uses: actions/upload-artifact@v6
        with:
          name: firmware-rp2040
          path: |
            firmware/rp2040/build/*.uf2
            firmware/rp2040/build/*.elf
            firmware/rp2040/build/generated/version.h
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  firmware-teensy41:
    needs: meta
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: pio-${{ hashFiles('firmware/teensy41/platformio.ini') }}
          restore-keys: pio-

      # micro_ros_platformio's build script sources ~/.platformio/penv/bin/activate,
      # which PlatformIO normally creates lazily — but not when PIO is installed
      # into a non-system Python. Bootstrap the penv ourselves so the library finds it.
      - name: Install PlatformIO into ~/.platformio/penv
        run: |
          if [[ ! -x "$HOME/.platformio/penv/bin/pio" ]]; then
            mkdir -p "$HOME/.platformio"
            python3 -m venv "$HOME/.platformio/penv"
            "$HOME/.platformio/penv/bin/pip" install --upgrade pip
            # Pin PlatformIO so a cold cache can't pull a newer core that
            # resolves `platform = teensy` to a drifted GCC toolchain and
            # breaks the micro-ROS build. Bump deliberately with the
            # platform pin in firmware/teensy41/platformio.ini.
            "$HOME/.platformio/penv/bin/pip" install 'platformio==6.1.16'
          fi
          echo "$HOME/.platformio/penv/bin" >> "$GITHUB_PATH"

      - name: Build firmware (hardware)
        run: |
          cd firmware/teensy41
          pio run -e hardware

      - uses: actions/upload-artifact@v6
        with:
          name: firmware-teensy41
          path: |
            firmware/teensy41/build/hardware/firmware.hex
            firmware/teensy41/build/hardware/firmware.bin
            firmware/teensy41/build/hardware/firmware.elf
            firmware/teensy41/include/version.h
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  firmware-raspberrypi:
    needs: meta
    # Native arm64 runner. package.sh --multi-target invokes bundle-debs.sh,
    # which apt-downloads arm64 debs inside a debian:<release> container. On
    # the amd64 runner that container died with "exec format error" (no
    # qemu), so the offline deb cache never built and the Pi bundle shipped
    # bare (339 KB). arm64 runs it natively.
    runs-on: ubuntu-22.04-arm
    # ROS pins — KEEP IN SYNC with the package-server matrix and
    # .github/workflows/ros2-build.yml. The hash computed below must match
    # the tag ros2-build published, or `gh release download` finds nothing.
    env:
      ROS_DISTRO: kilted
      ARCH: arm64
      ROS2_REPOS_REF: release-kilted-20250728
      MICRO_ROS_REF: 6.0.1
    steps:
      - uses: actions/checkout@v5

      # Recompute the content hash ros2-build tagged its releases with
      # (identical logic to package-server's "Resolve ROS2 release tag").
      # Bookworm keeps the bare tag; trixie carries a -trixie segment.
      - name: Resolve ROS2 release tags
        id: ros2
        run: |
          set -eo pipefail
          mkdir -p _ros2_src
          curl -fsSL \
            "https://raw.githubusercontent.com/ros2/ros2/${ROS2_REPOS_REF}/ros2.repos" \
            -o _ros2_src/ros2.repos
          MICRO_SHA=$(git ls-remote https://github.com/micro-ROS/micro_ros_setup.git \
            "refs/tags/${MICRO_ROS_REF}" "refs/heads/${MICRO_ROS_REF}" "${MICRO_ROS_REF}" \
            | head -n1 | awk '{print $1}')
          [[ -n "${MICRO_SHA}" ]] || { echo "::error::Could not resolve MICRO_ROS_REF='${MICRO_ROS_REF}'"; exit 1; }
          echo "micro_ros_setup_sha=${MICRO_SHA}" > _ros2_src/micro_ros.txt
          HASH=$(cat _ros2_src/ros2.repos _ros2_src/micro_ros.txt \
                     scripts/build-ros2-in-container.sh | sha256sum | cut -c1-12)
          echo "bookworm_tag=ros2-${ROS_DISTRO}-${ARCH}-${HASH}" >> "$GITHUB_OUTPUT"
          echo "trixie_tag=ros2-${ROS_DISTRO}-${ARCH}-trixie-${HASH}" >> "$GITHUB_OUTPUT"
          echo "Resolved: bookworm=ros2-${ROS_DISTRO}-${ARCH}-${HASH}  trixie=ros2-${ROS_DISTRO}-${ARCH}-trixie-${HASH}"

      # Bookworm tree is required — it's the current Pi 5 fleet. package.sh
      # resolves it at _ros2_bookworm/opt/ros/<distro>/install.
      - name: Download bookworm ROS2 tree
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          mkdir -p "_ros2_bookworm/opt/ros/${ROS_DISTRO}"
          gh release download "${{ steps.ros2.outputs.bookworm_tag }}" \
            --pattern 'ros2-install.tar.gz' --output ros2-bookworm.tar.gz
          tar -xzf ros2-bookworm.tar.gz -C "_ros2_bookworm/opt/ros/${ROS_DISTRO}"
          test -f "_ros2_bookworm/opt/ros/${ROS_DISTRO}/install/setup.bash"

      # Trixie tree is BEST-EFFORT: until the trixie ros2-build release is
      # published, this warns and the bundle is bookworm-only. package.sh
      # --multi-target bundles whatever trees are present, so this job is
      # safe to run before trixie exists and auto-upgrades once it does.
      - name: Download trixie ROS2 tree (best-effort)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          if gh release view "${{ steps.ros2.outputs.trixie_tag }}" >/dev/null 2>&1; then
            mkdir -p "_ros2_trixie/opt/ros/${ROS_DISTRO}"
            gh release download "${{ steps.ros2.outputs.trixie_tag }}" \
              --pattern 'ros2-install.tar.gz' --output ros2-trixie.tar.gz
            tar -xzf ros2-trixie.tar.gz -C "_ros2_trixie/opt/ros/${ROS_DISTRO}"
            test -f "_ros2_trixie/opt/ros/${ROS_DISTRO}/install/setup.bash"
            echo "Bundled trixie ROS2 tree."
          else
            echo "::warning::No trixie ROS2 release (${{ steps.ros2.outputs.trixie_tag }}) published yet — bundling bookworm only. Run the ros2-build workflow to publish it."
          fi

      # --multi-target bundles each present release's ROS2 tree + a matching
      # offline deb cache (auto-built via bundle-debs.sh) under
      # ros2_install/<rel>/ and deps/<rel>/. No version arg on purpose —
      # package.sh falls back to the Pi firmware's own __version__ so the
      # UI's "update available" check compares against what the Pi announces.
      - name: Package Pi node firmware (multi-target, offline)
        run: |
          cd firmware/raspberrypi/scripts
          ./package.sh --multi-target

      - uses: actions/upload-artifact@v6
        with:
          name: firmware-raspberrypi
          path: firmware/raspberrypi/dist/
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Steam Deck controller AppImage. Builds natively on the Ubuntu amd64
  # runner — no QEMU/Rosetta tax here, unlike the Apple Silicon Mac
  # path through controller/appimage/build-docker.sh. We share the same
  # controller/appimage/build-bundle.sh body, so any change to the
  # bundle layout / staging logic stays in lockstep with the local path.
  appimage-controller:
    needs: meta
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              nodejs npm \
              libwebkit2gtk-4.1-dev libsoup-3.0-dev libgtk-3-dev \
              librsvg2-dev libssl-dev libudev-dev \
              pkg-config build-essential file \
              fuse libfuse2 \
              ca-certificates curl git

      - name: Install Rust (stable)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
              sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # linuxdeploy + appimagetool aren't packaged for Ubuntu. We grab
      # the upstream AppImages and put them on PATH. build-bundle.sh
      # exports APPIMAGE_EXTRACT_AND_RUN=1 so they self-extract
      # instead of mounting via FUSE (CI runners often lack /dev/fuse).
      - name: Install AppImage bundler tools
        run: |
          sudo curl -fsSL -o /usr/local/bin/linuxdeploy \
              https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          sudo curl -fsSL -o /usr/local/bin/linuxdeploy-plugin-appimage \
              https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          sudo curl -fsSL -o /usr/local/bin/appimagetool \
              https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/linuxdeploy \
                        /usr/local/bin/linuxdeploy-plugin-appimage \
                        /usr/local/bin/appimagetool

      # Caches cargo registry + cargo target dir + npm package cache +
      # node_modules. Key includes Cargo.lock + package-lock.json so
      # dep bumps cleanly invalidate. The dir layout matches
      # build-bundle.sh's BUILD_DIR convention.
      - name: Cache cargo + npm
        uses: actions/cache@v5
        with:
          path: |
            /tmp/saint-controller-build/cargo
            /tmp/saint-controller-build/target
            /tmp/saint-controller-build/node_modules
            /tmp/saint-controller-build/npm-cache
          key: controller-appimage-${{ hashFiles('controller/Cargo.lock', 'controller/package-lock.json') }}
          restore-keys: controller-appimage-

      # On native Linux runners tauri's own linuxdeploy invocation
      # succeeds, so the build-bundle.sh fallback path doesn't fire.
      # No need for the LD_PRELOAD shim setup that the Mac driver
      # leans on; everything just works through tauri-bundler.
      - name: Build controller AppImage
        env:
          REPO_ROOT: ${{ github.workspace }}
          BUILD_DIR: /tmp/saint-controller-build
        run: |
          controller/appimage/build-bundle.sh

      - uses: actions/upload-artifact@v6
        with:
          name: appimage-controller
          # Upload the staged files exactly as build-bundle.sh wrote
          # them, so package-server can copy the dir contents verbatim
          # into server/resources/firmware/controller/.
          path: server/resources/firmware/controller/
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  package-server:
    needs: [meta, firmware-rp2040, firmware-teensy41, firmware-raspberrypi, appimage-controller]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-22.04-arm
            arch: arm64
            ros: kilted
            # Upstream pins — keep in sync with the same-named env vars
            # in .github/workflows/ros2-build.yml. Bumping either here
            # without bumping there (or vice versa) produces a hash
            # mismatch and "No ROS2 release …-<hash> found".
            ros2_repos_ref: release-kilted-20250728
            micro_ros_ref: 6.0.1
            debian_release: bookworm
    runs-on: ${{ matrix.runs-on }}
    env:
      ROS_DISTRO: ${{ matrix.ros }}
      ROS2_REPOS_REF: ${{ matrix.ros2_repos_ref }}
      MICRO_ROS_REF: ${{ matrix.micro_ros_ref }}
      ARCH: ${{ matrix.arch }}
      DEBIAN_RELEASE: ${{ matrix.debian_release }}
    steps:
      - uses: actions/checkout@v5

      # ------------------------------------------------------------------------
      # Locate the matching ROS2 source-build release. Same hash logic as
      # ros2-build.yml — if no matching release exists, fail with a clear
      # message instead of silently building against the wrong thing.
      - name: Resolve ROS2 release tag
        id: ros2_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          mkdir -p _ros2_src && cd _ros2_src
          # ros2.repos at the pinned release tag — must match the
          # ROS2_REPOS_REF in ros2-build.yml or the computed hash drifts.
          curl -fsSL \
            "https://raw.githubusercontent.com/ros2/ros2/${ROS2_REPOS_REF}/ros2.repos" \
            -o ros2.repos
          # Resolve MICRO_ROS_REF (tag or branch or SHA) to a concrete
          # SHA so the hash input is stable.
          MICRO_SHA=$(git ls-remote https://github.com/micro-ROS/micro_ros_setup.git \
            "refs/tags/${MICRO_ROS_REF}" "refs/heads/${MICRO_ROS_REF}" "${MICRO_ROS_REF}" \
            | head -n1 | awk '{print $1}')
          if [[ -z "${MICRO_SHA}" ]]; then
            echo "::error::Could not resolve MICRO_ROS_REF='${MICRO_ROS_REF}' to a SHA"
            exit 1
          fi
          echo "micro_ros_setup_sha=${MICRO_SHA}" > micro_ros.txt
          # Hash must match the algorithm in .github/workflows/ros2-build.yml
          # and scripts/build-local-dist.sh — including the build script
          # content so a pin bump (e.g. Micro-XRCE-DDS-Agent version)
          # produces a new tag that points at a freshly-built release.
          BUILD_SCRIPT="${GITHUB_WORKSPACE}/scripts/build-ros2-in-container.sh"
          HASH=$(cat ros2.repos micro_ros.txt "${BUILD_SCRIPT}" | sha256sum | cut -c1-12)
          TAG="ros2-${ROS_DISTRO}-${ARCH}-${HASH}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Looking up release: ${TAG}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            echo "::error::No ROS2 release ${TAG} found. Run the ros2-build workflow first."
            exit 1
          fi

      - name: Download ROS2 install tree
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          gh release download "${{ steps.ros2_release.outputs.tag }}" \
            --pattern 'ros2-install.tar.gz' \
            --output ros2-install.tar.gz
          mkdir -p _ros2/opt/ros/${ROS_DISTRO}
          tar -xzf ros2-install.tar.gz -C _ros2/opt/ros/${ROS_DISTRO}
          ls _ros2/opt/ros/${ROS_DISTRO}/install/setup.bash >/dev/null
          echo "ROS2 extracted to _ros2/opt/ros/${ROS_DISTRO}/install/"

      - name: Download firmware artifacts
        uses: actions/download-artifact@v7
        with:
          path: _fw

      - name: Stage firmware into resources
        run: |
          set -eo pipefail
          mkdir -p server/resources/firmware/{rp2040,teensy41,raspberrypi,controller}
          if [[ -d _fw/firmware-rp2040 ]]; then
            find _fw/firmware-rp2040 -type f \( -name '*.uf2' -o -name '*.elf' \) \
              -exec cp -v {} server/resources/firmware/rp2040/ \;
            # version.h sits alongside the artifacts in the build dir;
            # the upload artifact preserves its `generated/` subpath.
            if [[ -f _fw/firmware-rp2040/generated/version.h ]]; then
              mkdir -p server/resources/firmware/rp2040/generated
              cp -v _fw/firmware-rp2040/generated/version.h \
                server/resources/firmware/rp2040/generated/version.h
            fi
          fi
          if [[ -d _fw/firmware-teensy41 ]]; then
            find _fw/firmware-teensy41 -type f -name '*.hex' \
              -exec cp -v {} server/resources/firmware/teensy41/ \;
            # The runtime OTA path streams firmware.bin (renamed to
            # saint_node.bin to match the in-repo staging name). Without
            # this, the dist tarball ships whatever .bin happened to be
            # committed last, which silently drifts behind the freshly
            # built .hex.
            teensy_bin=$(find _fw/firmware-teensy41 -type f -name 'firmware.bin' -print -quit)
            if [[ -n "${teensy_bin}" ]]; then
              cp -v "${teensy_bin}" server/resources/firmware/teensy41/saint_node.bin
            fi
            teensy_ver=$(find _fw/firmware-teensy41 -type f -name 'version.h' -print -quit)
            if [[ -n "${teensy_ver}" ]]; then
              mkdir -p server/resources/firmware/teensy41/generated
              cp -v "${teensy_ver}" server/resources/firmware/teensy41/generated/version.h
            fi
          fi
          if [[ -d _fw/firmware-raspberrypi ]]; then
            cp -rv _fw/firmware-raspberrypi/. server/resources/firmware/raspberrypi/
          fi
          # The appimage-controller artifact ships the .AppImage + the
          # already-populated info.json (built by build-bundle.sh),
          # so a plain dir copy is enough — no per-file fixups needed
          # like the node firmware jobs.
          if [[ -d _fw/appimage-controller ]]; then
            cp -rv _fw/appimage-controller/. server/resources/firmware/controller/
          fi
          ls -la server/resources/firmware/*/

      # ------------------------------------------------------------------------
      # Download all runtime apt deps as .deb files into _debs/ so the dist
      # tarball is self-contained — air-gapped targets can install without
      # internet. install.sh will mount this as a local apt repo at install
      # time. Targets bookworm only; non-bookworm hosts fall back to online
      # apt in install.sh.
      - name: Bundle runtime apt dependencies
        run: |
          set -eo pipefail
          mkdir -p _debs
          # Single source of truth: packaging/runtime-deps.txt (shared with
          # packaging/install.sh and scripts/build-local-dist.sh, so the
          # bundled set can't drift from the installed set — which once
          # dropped the audio stack: a 229 MB release vs the ~600 MB local
          # build). Strip comment / blank lines and hand the set to the
          # container via -e; the quoted heredoc keeps the runner shell from
          # expanding $DEB_LIST, so the container's bash expands it at runtime.
          DEB_LIST="$(grep -vE '^[[:space:]]*#|^[[:space:]]*$' packaging/runtime-deps.txt | tr '\n' ' ')"
          echo "Bundling: ${DEB_LIST}"
          docker run --rm -i --platform linux/arm64 \
            -v "${PWD}/_debs:/debs" \
            -e DEB_LIST="${DEB_LIST}" \
            "debian:${DEBIAN_RELEASE}-slim" \
            bash -eo pipefail <<'CONTAINER_EOF'
          export DEBIAN_FRONTEND=noninteractive
          apt-get update

          # --reinstall forces re-download even when the slim image happens to
          # have a package already installed — so the bundled cache is
          # self-contained for any target Pi state.
          apt-get install -y --download-only --reinstall $DEB_LIST

          cp /var/cache/apt/archives/*.deb /debs/

          # Local apt repo index. install.sh adds a temporary sources.list
          # entry pointing at this directory.
          apt-get install -y --no-install-recommends apt-utils
          cd /debs
          apt-ftparchive packages . > Packages
          gzip -kf Packages
          echo "Bundled $(ls -1 *.deb | wc -l) .deb files, $(du -sh . | cut -f1) total"
          CONTAINER_EOF

      # ------------------------------------------------------------------------
      # Build the Vue web UI on the runner. Output is platform-independent
      # static assets — no reason to drag npm/node into the arm64 colcon
      # container. setup.py globs server/web/dist/ into the install tree,
      # so this has to land before the colcon step below.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/web/package-lock.json

      - name: Build web UI (Vite)
        working-directory: server/web
        run: |
          set -eo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
          npm run build
          test -f dist/index.html
          echo "Web build size: $(du -sh dist | cut -f1)"

      # ------------------------------------------------------------------------
      # Build saint_os inside the same Debian Bookworm environment the bundled
      # ROS2 was built against — this guarantees libstdc++, libpython, and
      # rosidl typesupport ABIs all match.
      - name: Build saint_os against bundled ROS2 (in bookworm container)
        run: |
          set -eo pipefail
          # -i forwards the heredoc as stdin; without it bash inside the
          # container gets no input and exits silently.
          docker run --rm -i --platform linux/arm64 \
            -v "${PWD}:/work" \
            -w /work \
            -e ROS_DISTRO \
            "debian:${DEBIAN_RELEASE}" \
            bash -eo pipefail <<'CONTAINER_EOF'
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
              ca-certificates curl gnupg \
              build-essential cmake git pkg-config \
              python3 python3-dev python3-pip \
              python3-numpy python3-yaml \
              libpython3.11 libssl3 libtinyxml2-dev libxml2-dev libyaml-dev
          # ROS2 tooling — Debian has no apt packages for these; install from
          # PyPI per the official ROS2 source-install procedure.
          python3 -m pip install --break-system-packages -U \
              colcon-common-extensions \
              "empy==3.3.4" \
              lark
          export LANG=C.UTF-8 LC_ALL=C.UTF-8

          # Place ROS2 INSIDE the container at the exact path it'll be
          # deployed to on the target (/opt/ros/<distro>/install/). colcon
          # records absolute paths to ROS2's local_setup.bash etc. in the
          # saint_os install tree — if those paths don't match the deploy
          # location, the systemd unit fails to source on the target.
          mkdir -p /opt/ros/${ROS_DISTRO}
          cp -a /work/_ros2/opt/ros/${ROS_DISTRO}/install /opt/ros/${ROS_DISTRO}/install
          source /opt/ros/${ROS_DISTRO}/install/setup.bash

          # --base-paths server: scope colcon's package discovery to the
          # one directory that actually contains the ROS package. Kept in
          # sync with scripts/build-local-dist.sh — see the comment there
          # for why an unbounded crawl is unreliable.
          colcon build \
              --base-paths server \
              --merge-install \
              --packages-select saint_os \
              --cmake-args -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          CONTAINER_EOF

          # Fail loud if no libraries were produced — make-dist.sh will
          # otherwise happily package an empty install/ tree and the
          # target's installer dies with "find: install/lib: No such
          # file or directory".
          [[ -d install/lib ]] \
              || { echo "ERROR: install/lib missing after colcon build" >&2; exit 1; }
          ls install/setup.bash >/dev/null
          echo "saint_os built: $(du -sh install | cut -f1)"

      - name: Assemble distribution tarball
        run: |
          scripts/make-dist.sh \
            "${{ needs.meta.outputs.version }}" \
            "${{ matrix.arch }}" \
            "${{ matrix.ros }}"

      - uses: actions/upload-artifact@v6
        with:
          name: saint-os_${{ needs.meta.outputs.version }}_${{ matrix.arch }}_${{ matrix.ros }}
          path: dist/*.tar.zst
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  release:
    needs: package-server
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: saint-os_*
          merge-multiple: true

      - name: Inspect downloaded artifacts
        run: ls -lah dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.zst
          generate_release_notes: true
          fail_on_unmatched_files: true
