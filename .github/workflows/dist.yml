name: dist

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (default: <VERSION>-<sha7>)'
        required: false

concurrency:
  group: dist-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

env:
  # Opt JS actions into Node.js 24 ahead of the 2026-06-02 forced cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------------------
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          set -euo pipefail
          BASE=$(tr -d '[:space:]' < VERSION)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${BASE}-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

  # ---------------------------------------------------------------------------
  firmware-rp2040:
    needs: meta
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential \
            gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib \
            python3 git

      - name: Cache Pico SDK
        id: pico-sdk-cache
        uses: actions/cache@v4
        with:
          path: ~/pico-sdk
          key: pico-sdk-2.1.0

      - name: Clone Pico SDK
        if: steps.pico-sdk-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 2.1.0 https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          git -C ~/pico-sdk submodule update --init --recursive --depth 1

      - name: Build firmware (hardware)
        env:
          PICO_SDK_PATH: /home/runner/pico-sdk
        run: |
          cd saint_os/firmware/rp2040
          ./build.sh hw

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-rp2040
          path: |
            saint_os/firmware/rp2040/build/*.uf2
            saint_os/firmware/rp2040/build/*.elf
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  firmware-teensy41:
    needs: meta
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: pio-${{ hashFiles('saint_os/firmware/teensy41/platformio.ini') }}
          restore-keys: pio-

      # micro_ros_platformio's build script sources ~/.platformio/penv/bin/activate,
      # which PlatformIO normally creates lazily — but not when PIO is installed
      # into a non-system Python. Bootstrap the penv ourselves so the library finds it.
      - name: Install PlatformIO into ~/.platformio/penv
        run: |
          if [[ ! -x "$HOME/.platformio/penv/bin/pio" ]]; then
            mkdir -p "$HOME/.platformio"
            python3 -m venv "$HOME/.platformio/penv"
            "$HOME/.platformio/penv/bin/pip" install --upgrade pip platformio
          fi
          echo "$HOME/.platformio/penv/bin" >> "$GITHUB_PATH"

      - name: Build firmware (hardware)
        run: |
          cd saint_os/firmware/teensy41
          pio run -e hardware

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-teensy41
          path: saint_os/firmware/teensy41/.pio/build/hardware/firmware.hex
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  firmware-rpi5:
    needs: meta
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Package Pi 5 node firmware
        run: |
          cd saint_os/firmware/rpi5/scripts
          ./package.sh "${{ needs.meta.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-rpi5
          path: saint_os/firmware/rpi5/dist/
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  package-server:
    needs: [meta, firmware-rp2040, firmware-teensy41, firmware-rpi5]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-22.04-arm
            arch: arm64
            ros: jazzy
            micro_ros_ref: jazzy
            debian_release: bookworm
    runs-on: ${{ matrix.runs-on }}
    env:
      ROS_DISTRO: ${{ matrix.ros }}
      MICRO_ROS_REF: ${{ matrix.micro_ros_ref }}
      ARCH: ${{ matrix.arch }}
      DEBIAN_RELEASE: ${{ matrix.debian_release }}
    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Locate the matching ROS2 source-build release. Same hash logic as
      # ros2-build.yml — if no matching release exists, fail with a clear
      # message instead of silently building against the wrong thing.
      - name: Resolve ROS2 release tag
        id: ros2_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          mkdir -p _ros2_src && cd _ros2_src
          curl -fsSL \
            "https://raw.githubusercontent.com/ros2/ros2/${ROS_DISTRO}/ros2.repos" \
            -o ros2.repos
          MICRO_SHA=$(git ls-remote https://github.com/micro-ROS/micro_ros_setup.git \
            "refs/heads/${MICRO_ROS_REF}" | awk '{print $1}')
          echo "micro_ros_setup_sha=${MICRO_SHA}" > micro_ros.txt
          HASH=$(cat ros2.repos micro_ros.txt | sha256sum | cut -c1-12)
          TAG="ros2-${ROS_DISTRO}-${ARCH}-${HASH}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Looking up release: ${TAG}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            echo "::error::No ROS2 release ${TAG} found. Run the ros2-build workflow first."
            exit 1
          fi

      - name: Download ROS2 install tree
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          gh release download "${{ steps.ros2_release.outputs.tag }}" \
            --pattern 'ros2-install.tar.gz' \
            --output ros2-install.tar.gz
          mkdir -p _ros2/opt/ros/${ROS_DISTRO}
          tar -xzf ros2-install.tar.gz -C _ros2/opt/ros/${ROS_DISTRO}
          ls _ros2/opt/ros/${ROS_DISTRO}/install/setup.bash >/dev/null
          echo "ROS2 extracted to _ros2/opt/ros/${ROS_DISTRO}/install/"

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: _fw

      - name: Stage firmware into resources
        run: |
          set -eo pipefail
          mkdir -p saint_os/resources/firmware/{rp2040,teensy41,rpi5}
          if [[ -d _fw/firmware-rp2040 ]]; then
            find _fw/firmware-rp2040 -type f \( -name '*.uf2' -o -name '*.elf' \) \
              -exec cp -v {} saint_os/resources/firmware/rp2040/ \;
          fi
          if [[ -d _fw/firmware-teensy41 ]]; then
            find _fw/firmware-teensy41 -type f -name '*.hex' \
              -exec cp -v {} saint_os/resources/firmware/teensy41/ \;
          fi
          if [[ -d _fw/firmware-rpi5 ]]; then
            cp -rv _fw/firmware-rpi5/. saint_os/resources/firmware/rpi5/
          fi
          ls -la saint_os/resources/firmware/*/

      # ------------------------------------------------------------------------
      # Download all runtime apt deps as .deb files into _debs/ so the dist
      # tarball is self-contained — air-gapped targets can install without
      # internet. install.sh will mount this as a local apt repo at install
      # time. Targets bookworm only; non-bookworm hosts fall back to online
      # apt in install.sh.
      - name: Bundle runtime apt dependencies
        run: |
          set -eo pipefail
          mkdir -p _debs
          docker run --rm -i --platform linux/arm64 \
            -v "${PWD}/_debs:/debs" \
            "debian:${DEBIAN_RELEASE}-slim" \
            bash -eo pipefail <<'CONTAINER_EOF'
          export DEBIAN_FRONTEND=noninteractive
          apt-get update

          # --reinstall forces re-download even when slim image happens to
          # have a package already installed — so the bundled cache is
          # self-contained for any target Pi state.
          apt-get install -y --download-only --reinstall \
              libssl3 libtinyxml2-9 libyaml-0-2 libxml2 libacl1 libcurl4 \
              python3 python3-yaml python3-numpy \
              python3-aiohttp python3-websockets python3-psutil \
              python3-packaging python3-lark python3-empy \
              python3-catkin-pkg python3-importlib-metadata \
              libpython3.11 python3.11 \
              network-manager wireless-regdb rfkill iw \
              avahi-daemon libnss-mdns

          cp /var/cache/apt/archives/*.deb /debs/

          # Local apt repo index. install.sh adds a temporary sources.list
          # entry pointing at this directory.
          apt-get install -y --no-install-recommends apt-utils
          cd /debs
          apt-ftparchive packages . > Packages
          gzip -kf Packages
          echo "Bundled $(ls -1 *.deb | wc -l) .deb files, $(du -sh . | cut -f1) total"
          CONTAINER_EOF

      # ------------------------------------------------------------------------
      # Build saint_os inside the same Debian Bookworm environment the bundled
      # ROS2 was built against — this guarantees libstdc++, libpython, and
      # rosidl typesupport ABIs all match.
      - name: Build saint_os against bundled ROS2 (in bookworm container)
        run: |
          set -eo pipefail
          # -i forwards the heredoc as stdin; without it bash inside the
          # container gets no input and exits silently.
          docker run --rm -i --platform linux/arm64 \
            -v "${PWD}:/work" \
            -w /work \
            -e ROS_DISTRO \
            "debian:${DEBIAN_RELEASE}" \
            bash -eo pipefail <<'CONTAINER_EOF'
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
              ca-certificates curl gnupg \
              build-essential cmake git pkg-config \
              python3 python3-dev python3-pip \
              python3-numpy python3-yaml \
              libpython3.11 libssl3 libtinyxml2-dev libxml2-dev libyaml-dev
          # ROS2 tooling — Debian has no apt packages for these; install from
          # PyPI per the official ROS2 source-install procedure.
          python3 -m pip install --break-system-packages -U \
              colcon-common-extensions \
              "empy==3.3.4" \
              lark
          export LANG=C.UTF-8 LC_ALL=C.UTF-8

          # Place ROS2 INSIDE the container at the exact path it'll be
          # deployed to on the target (/opt/ros/<distro>/install/). colcon
          # records absolute paths to ROS2's local_setup.bash etc. in the
          # saint_os install tree — if those paths don't match the deploy
          # location, the systemd unit fails to source on the target.
          mkdir -p /opt/ros/${ROS_DISTRO}
          cp -a /work/_ros2/opt/ros/${ROS_DISTRO}/install /opt/ros/${ROS_DISTRO}/install
          source /opt/ros/${ROS_DISTRO}/install/setup.bash

          colcon build \
              --merge-install \
              --packages-select saint_os \
              --cmake-args -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          CONTAINER_EOF

          ls install/setup.bash >/dev/null
          echo "saint_os built: $(du -sh install | cut -f1)"

      - name: Assemble distribution tarball
        run: |
          .github/scripts/make-dist.sh \
            "${{ needs.meta.outputs.version }}" \
            "${{ matrix.arch }}" \
            "${{ matrix.ros }}"

      - uses: actions/upload-artifact@v4
        with:
          name: saint-os_${{ needs.meta.outputs.version }}_${{ matrix.arch }}_${{ matrix.ros }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  release:
    needs: package-server
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: saint-os_*
          merge-multiple: true

      - name: Inspect downloaded artifacts
        run: ls -lah dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
